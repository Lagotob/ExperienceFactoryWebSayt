<!DOCTYPE html>
<html lang="uz" data-exp-skin="dashboard">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Factory | Global System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00f2ff;
            --primary-dark: #00b8c4;
            --secondary: #7000ff;
            --secondary-dark: #5500cc;
            --accent: #ff0055;
            --bg: #050505;
            --bg-light: #0a0a0a;
            --card-bg: rgba(15, 15, 15, 0.95);
            --border: 1px solid rgba(0, 242, 255, 0.2);
            --border-light: 1px solid rgba(255, 255, 255, 0.05);
            --text-dim: #888;
            --text-muted: #555;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4444;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 280px;
            background: #080808;
            border-right: var(--border);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .logo {
            padding: 30px 25px;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 1.4rem;
            text-align: center;
            border-bottom: var(--border);
            letter-spacing: 2px;
        }

        .logo span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--text-dim);
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 0.75rem;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .nav-link i {
            width: 24px;
            font-size: 1.1rem;
            text-align: center;
        }

        .nav-link.active,
        .nav-link:hover {
            color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
            border-left-color: var(--primary);
        }

        /* ========== MAIN CONTENT ========== */
        .content {
            margin-left: 280px;
            padding: 30px 40px;
            width: calc(100% - 280px);
            min-height: 100vh;
        }

        /* Header */
        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: var(--border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1);
        }

        .stat-card h3 {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'Orbitron';
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-family: 'Orbitron';
            font-weight: 700;
            color: var(--primary);
        }

        /* Progress Bar */
        .progress-section {
            background: var(--card-bg);
            border: var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            width: 0%;
            transition: width 1s ease;
            border-radius: 10px;
            box-shadow: 0 0 10px var(--primary);
        }

        /* Tasks Section */
        .tasks-section h2 {
            font-family: 'Orbitron';
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tasks-section h2 i {
            color: var(--primary);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            background: var(--card-bg);
            border: var(--border-light);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .task-item:hover {
            border-color: var(--primary);
            transform: translateX(8px);
        }

        .task-info h4 {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .task-info p {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .task-reward {
            font-family: 'Orbitron';
            color: var(--success);
            font-weight: bold;
            font-size: 1rem;
        }

        .task-reward i {
            font-size: 0.8rem;
        }

        .difficulty {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: 'Orbitron';
            margin-left: 10px;
        }

        .difficulty.oson {
            background: rgba(0, 255, 136, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .difficulty.orta {
            background: rgba(255, 170, 0, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 170, 0, 0.3);
        }

        .difficulty.qiyin {
            background: rgba(255, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        /* Session Time */
        .session-box {
            padding: 20px;
            border-top: var(--border);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
        }

        .session-box span {
            color: var(--primary);
            font-family: 'Orbitron';
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #111;
            padding: 40px;
            border-radius: 24px;
            border: var(--border);
            width: 450px;
            text-align: center;
        }

        .modal-content h2 {
            font-family: 'Orbitron';
            color: var(--primary);
            margin-bottom: 25px;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .modal-content input:focus,
        .modal-content select:focus {
            border-color: var(--primary);
        }

        .modal-content button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: black;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .modal-content button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--primary);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .sidebar span:not(.logo) {
                display: none;
            }
            .logo {
                font-size: 0.9rem;
                padding: 20px;
            }
            .content {
                margin-left: 80px;
                width: calc(100% - 80px);
                padding: 20px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
        }
    </style>

<body>

    <aside class="sidebar">
        <div class="logo"><span>EXP</span> FACTORY</div>
        <nav style="margin-top: 20px;">
            <a href="#" class="nav-link active" data-page="dashboard">
                <i class="fas fa-home"></i> <span>DASHBOARD</span>
            </a>
            <a href="#" class="nav-link" data-page="tasks">
                <i class="fas fa-tasks"></i> <span>TOPSHIRIQLAR</span>
            </a>
            <a href="#" class="nav-link" data-page="leaderboard">
                <i class="fas fa-trophy"></i> <span>REYTING</span>
            </a>
            <a href="#" class="nav-link" data-page="market">

            </a>

    <script src="theme.js"></script>
    <script>
        let currentUser = null;
        try {
            const raw = localStorage.getItem('currentUser') || localStorage.getItem('exp_current_user');
            if (raw) currentUser = JSON.parse(raw);
        } catch (_) {
            currentUser = null;
        }
        let allTasks = [];
        let sessionSeconds = parseInt(localStorage.getItem('session_time')) || 0;
        let pendingAvatar = null;

        function persistClientUser() {
            if (!currentUser) return;
            if (currentUser.user_id != null && currentUser.id == null) currentUser.id = currentUser.user_id;
            const s = JSON.stringify(currentUser);
            localStorage.setItem('currentUser', s);
            localStorage.setItem('exp_current_user', s);
        }

        if (currentUser) {
            if (currentUser.bio === undefined) currentUser.bio = '';
            if (currentUser.avatar_data === undefined) currentUser.avatar_data = '';
            persistClientUser();
        }

        setInterval(() => {
            sessionSeconds++;
            if (sessionSeconds % 10 === 0) {
                localStorage.setItem('session_time', String(sessionSeconds));
            }
            const h = Math.floor(sessionSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((sessionSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (sessionSeconds % 60).toString().padStart(2, '0');
            const el = document.getElementById('session-time');
            if (el) el.textContent = `${h}:${m}:${s}`;
        }, 1000);
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('session_time', String(sessionSeconds));
        });

        // Load tasks from server
        async function loadTasks() {
            try {
                const response = await fetch('/api/tasks');
                const data = await response.json();
                if (data.success) {
                    allTasks = data.tasks;
                } else {
                    // Default tasks
                    allTasks = [
                        { id: 1, title: "Algoritmlar Asosi", description: "C++ tilida 5 ta saralash algoritmini yozing.", difficulty: "oson", reward_xp: 250, tech_stack: "C++" },
                        { id: 2, title: "Baza Bilan Ishlash", description: "PostgreSQL da murakkab JOIN so'rovlarini bajaring.", difficulty: "orta", reward_xp: 400, tech_stack: "SQL" },
                        { id: 3, title: "Web Scraper", description: "Python yordamida biror saytdan ma'lumot yig'uvchi bot yarating.", difficulty: "qiyin", reward_xp: 600, tech_stack: "Python" }
                    ];
                }
            } catch (e) {
                console.error("Tasks load error:", e);
            }
        }

        // Dashboard page
        function renderDashboard() {
            if (!currentUser) return;
            
            const level = Math.floor(currentUser.xp / 1000) + 1;
            const progress = ((currentUser.xp % 1000) / 1000) * 100;
            const nextXP = 1000 - (currentUser.xp % 1000);

            const html = `
                <div class="header">
                    <h1>SALOM, ${(currentUser.full_name || currentUser.username || 'Agent').toUpperCase()}!</h1>
                    <p><i class="fas fa-map-marker-alt"></i> ${currentUser.region || 'Hudud tanlanmagan'} | 
                       <i class="fas fa-graduation-cap"></i> ${currentUser.school || 'O\'quv joyi tanlanmagan'}</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <h3><i class="fas fa-coins"></i> HISOB (SO'M)</h3>
                        <div class="value">${(currentUser.coins || 0).toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3><i class="fas fa-star"></i> TAJRIBA (XP)</h3>
                        <div class="value">${(currentUser.xp || 0).toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3><i class="fas fa-chart-line"></i> DARAJA</h3>
                        <div class="value">${level}</div>
                    </div>
                    <div class="stat-card">
                        <h3><i class="fas fa-check-circle"></i> BAJARILGAN</h3>
                        <div class="value">${currentUser.completed_tasks || 0}</div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="progress-header">
                        <span>KEYINGI DARAJA PROGRESSI</span>
                        <span>${Math.floor(progress)}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%;"></div>
                    </div>
                    <p style="margin-top: 15px; font-size: 0.75rem; color: #666;">
                        <i class="fas fa-arrow-up"></i> Keyingi daraja uchun yana ${nextXP} XP kerak
                    </p>
                </div>

                <div class="tasks-section">
                    <h2><i class="fas fa-tasks"></i> FAOL TOPSHIRIQLAR</h2>
                    <div class="task-list">
                        ${allTasks.slice(0, 3).map(task => `
                            <div class="task-item" onclick="viewTask(${task.id})">
                                <div class="task-info">
                                    <h4>${task.title}</h4>
                                    <p>${task.description.substring(0, 60)}...</p>
                                </div>
                                <div class="task-reward">
                                    +${task.reward_xp} <i class="fas fa-coins"></i>
                                    <span class="difficulty ${task.difficulty}">${task.difficulty === 'oson' ? 'Oson' : task.difficulty === 'orta' ? 'O\'rta' : 'Qiyin'}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('page-content').innerHTML = html;
        }

        // Tasks page
        function renderTasks() {
            const html = `
                <div class="header">
                    <h1><i class="fas fa-code"></i> TOPSHIRIQLAR</h1>
                    <p>Yechimlaringizni yuboring va XP to'plang</p>
                </div>

                <div class="tasks-section">
                    <div class="task-list">
                        ${allTasks.map(task => `
                            <div class="task-item" onclick="viewTask(${task.id})">
                                <div class="task-info">
                                    <h4>${task.title}</h4>
                                    <p>${task.description}</p>
                                    <small style="color: #555;"><i class="fas fa-microchip"></i> ${task.tech_stack || 'Web'}</small>
                                </div>
                                <div class="task-reward">
                                    +${task.reward_xp} <i class="fas fa-coins"></i>
                                    <span class="difficulty ${task.difficulty}">${task.difficulty === 'oson' ? 'Oson' : task.difficulty === 'orta' ? 'O\'rta' : 'Qiyin'}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('page-content').innerHTML = html;
        }

        // Leaderboard page
        async function renderLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                const data = await response.json();
                const users = data.success && Array.isArray(data.users) ? data.users : [];

                const html = `
                    <div class="header">
                        <h1><i class="fas fa-trophy"></i> GLOBAL REYTING</h1>
                        <p>Eng faol va tajribali agentlar</p>
                    </div>
                    <div style="background: var(--card-bg); border-radius: 20px; border: var(--border); overflow: hidden;">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: var(--border);">
                                    <th style="padding: 15px; text-align: left; color: #555;">RANK</th>
                                    <th style="padding: 15px; text-align: left;">AGENT</th>
                                    <th style="padding: 15px; text-align: center;">XP</th>
                                    <th style="padding: 15px; text-align: center;">DARAJA</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${users.map((user, index) => `
                                    <tr style="border-bottom: 1px solid #111;">
                                        <td style="padding: 15px; color: var(--primary); font-family: 'Orbitron';">#${index + 1}</td>
                                        <td style="padding: 15px;"><b>${user.full_name || user.username}</b></td>
                                        <td style="padding: 15px; text-align: center;">${(user.xp || 0).toLocaleString()} XP</td>
                                        <td style="padding: 15px; text-align: center;">${Math.floor((user.xp || 0) / 1000) + 1}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                document.getElementById('page-content').innerHTML = html;
            } catch (e) {
                document.getElementById('page-content').innerHTML = '<div class="header"><h1>Reyting yuklanmadi</h1></div>';
            }
        }

        function escapeHtmlCl(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
        function escapeAttrCl(str) {
            if (str == null || str === undefined) return '';
            return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        }

        function onProfileAvatarFileCl(ev) {
            const f = ev.target.files && ev.target.files[0];
            if (!f) return;
            if (!f.type.startsWith('image/')) { alert("Faqat rasm fayli."); return; }
            if (f.size > 450 * 1024) { alert("Rasm 450 KB dan kichik bo'lsin."); return; }
            const reader = new FileReader();
            reader.onload = () => { pendingAvatar = reader.result; renderProfile(); };
            reader.readAsDataURL(f);
            ev.target.value = '';
        }

        function clearProfileAvatarCl() {
            if (!confirm("Rasmni olib tashlaysizmi?")) return;
            pendingAvatar = null;
            currentUser.avatar_data = '';
            persistClientUser();
            renderProfile();
        }

        async function pingSessionIfApi() {
            if (!currentUser || !currentUser.username || currentUser.password == null) return;
            try {
                await fetch('/api/ping', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser.username, password: currentUser.password })
                });
            } catch (_) { /* offline yoki DB yo'q */ }
        }

        async function deleteAccountCl() {
            const pwdEl = document.getElementById('delete-account-password');
            const pwd = pwdEl ? pwdEl.value : '';
            if (!pwd) {
                alert("Parolni kiriting.");
                return;
            }
            if (pwd !== currentUser.password) {
                alert("Parol noto'g'ri.");
                return;
            }
            if (!confirm("Hisobingiz butunlay o'chiriladi (serverdan). Davom etasizmi?")) return;
            const uid = currentUser.user_id != null ? currentUser.user_id : currentUser.id;
            try {
                const response = await fetch(`/api/users/${encodeURIComponent(uid)}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });
                let data = {};
                try {
                    data = await response.json();
                } catch (_) {}
                if (response.ok && data.success) {
                    localStorage.removeItem('currentUser');
                    localStorage.removeItem('exp_current_user');
                    currentUser = null;
                    alert("Hisob o'chirildi.");
                    location.reload();
                    return;
                }
                alert(data.error || "O'chirish muvaffaqiyatsiz (server javobi).");
            } catch (e) {
                alert("Server bilan aloqa yo'q yoki DB sozlanmagan.");
            }
        }

        function saveProfileSettingsCl() {
            const fullName = document.getElementById('edit-full-name').value.trim();
            const bio = document.getElementById('edit-bio').value;
            const oldPass = document.getElementById('edit-old-password').value;
            const newPass = document.getElementById('edit-new-password').value;
            const newPass2 = document.getElementById('edit-new-password2').value;
            if (!fullName) { alert("Ism-familiya bo'sh bo'lmasin."); return; }
            if (newPass || newPass2 || oldPass) {
                if (!oldPass) { alert("Joriy parolni kiriting."); return; }
                if (oldPass !== currentUser.password) { alert("Joriy parol noto'g'ri."); return; }
                if (newPass.length < 4) { alert("Yangi parol kamida 4 belgi."); return; }
                if (newPass !== newPass2) { alert("Parollar mos emas."); return; }
                currentUser.password = newPass;
            }
            currentUser.full_name = fullName;
            currentUser.bio = bio;
            if (pendingAvatar !== null) {
                currentUser.avatar_data = pendingAvatar;
                pendingAvatar = null;
            }
            persistClientUser();
            document.getElementById('edit-old-password').value = '';
            document.getElementById('edit-new-password').value = '';
            document.getElementById('edit-new-password2').value = '';
            alert("✅ Profil saqlandi.");
            renderProfile();
        }

        // Profile page
        function renderProfile() {
            if (!currentUser) return;
            
            const level = Math.floor(currentUser.xp / 1000) + 1;
            const joinDate = currentUser.created_at ? new Date(currentUser.created_at).toLocaleDateString('uz-UZ') : '2024-01-01';
            const avatarSrc = pendingAvatar !== null ? pendingAvatar : (currentUser.avatar_data || '');
            const avBox = avatarSrc
                ? `<img src="${avatarSrc}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
                : `<i class="fas fa-user" style="font-size: 3rem; color: white;"></i>`;
            const bioHtml = (currentUser.bio || '').trim()
                ? `<div style="margin:12px 0;padding:12px;border-radius:12px;background:rgba(0,242,255,0.06);border:1px solid rgba(255,255,255,0.08);max-width:520px;white-space:pre-wrap;">${escapeHtmlCl(currentUser.bio)}</div>`
                : `<p style="color:#666;font-size:0.85rem;">Bio qo'shilmagan.</p>`;

            const html = `
                <div class="header">
                    <h1><i class="fas fa-user-circle"></i> SHAXSIY PROFIL</h1>
                    <p>Hisobingiz va statistikangiz</p>
                </div>

                <div style="background: var(--card-bg); border: var(--border); border-radius: 24px; padding: 40px; display: flex; flex-wrap: wrap; gap: 40px;">
                    <div style="text-align: center;">
                        <div style="width: 120px; height: 120px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                            ${avBox}
                        </div>
                        <div style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;">
                            <input type="file" id="profile-avatar-file" accept="image/*" style="display:none" onchange="onProfileAvatarFileCl(event)">
                            <button type="button" onclick="document.getElementById('profile-avatar-file').click()" style="background:transparent;border:1px solid var(--primary);color:var(--primary);padding:6px 12px;border-radius:8px;font-size:0.7rem;cursor:pointer;font-family:Orbitron;">Rasm</button>
                            ${avatarSrc ? '<button type="button" onclick="clearProfileAvatarCl()" style="background:transparent;border:1px solid #ff4444;color:#ff4444;padding:6px 12px;border-radius:8px;font-size:0.7rem;cursor:pointer;font-family:Orbitron;">Olib tashlash</button>' : ''}
                        </div>
                        <div style="margin-top: 15px;">
                            <span style="background: rgba(0,242,255,0.1); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem;">LEVEL ${level}</span>
                        </div>
                    </div>
                    <div style="flex: 1;">
                        <h2 style="font-family: 'Orbitron'; margin-bottom: 12px;">${escapeHtmlCl(currentUser.full_name || currentUser.username)}</h2>
                        <div style="color:#888;font-size:0.8rem;margin-bottom:8px;"><i class="fas fa-user-tag"></i> @${escapeHtmlCl(currentUser.username)} <span style="opacity:0.7;">(login o'zgarmaydi)</span></div>
                        ${bioHtml}
                        <div style="display: grid; gap: 12px; margin-top: 12px;">
                            <div><i class="fas fa-map-marker-alt"></i> ${escapeHtmlCl(currentUser.region || 'Tanlanmagan')}</div>
                            <div><i class="fas fa-graduation-cap"></i> ${escapeHtmlCl(currentUser.school || 'Tanlanmagan')}</div>
                            <div><i class="fas fa-calendar"></i> Qo'shilgan sana: ${joinDate}</div>
                            <div><i class="fas fa-check-circle"></i> Bajarilgan topshiriqlar: ${currentUser.completed_tasks || 0}</div>
                        </div>
                        <button onclick="logout()" style="margin-top: 24px; background: rgba(255,68,68,0.2); border: 1px solid #ff4444; color: #ff4444; padding: 12px 30px; border-radius: 12px; cursor: pointer;">
                            <i class="fas fa-sign-out-alt"></i> TIZIMDAN CHIQISH
                        </button>
                    </div>
                </div>

                <div style="background: var(--card-bg); border: var(--border); border-radius: 20px; padding: 28px; margin-top: 24px;">
                    <h3 style="font-family: Orbitron; color: var(--primary); margin-bottom: 8px;">Profilni sozlash</h3>
                    <p style="color:#666;font-size:0.8rem;margin-bottom:16px;">Ism, bio, parol. Username o'zgarmaydi.</p>
                    <label style="display:block;font-size:0.7rem;color:#888;margin-bottom:4px;">Ism va familiya</label>
                    <input id="edit-full-name" type="text" value="${escapeAttrCl(currentUser.full_name || '')}" maxlength="120" style="width:100%;max-width:480px;padding:10px 12px;margin-bottom:12px;background:#111;border:1px solid #333;border-radius:10px;color:#fff;box-sizing:border-box;">
                    <label style="display:block;font-size:0.7rem;color:#888;margin-bottom:4px;">Bio</label>
                    <textarea id="edit-bio" maxlength="600" placeholder="O'zingiz haqingizda..." style="width:100%;max-width:480px;min-height:88px;padding:10px 12px;margin-bottom:12px;background:#111;border:1px solid #333;border-radius:10px;color:#fff;box-sizing:border-box;">${escapeHtmlCl(currentUser.bio || '')}</textarea>
                    <label style="display:block;font-size:0.7rem;color:#888;margin-bottom:4px;">Joriy parol</label>
                    <input id="edit-old-password" type="password" autocomplete="off" style="width:100%;max-width:480px;padding:10px 12px;margin-bottom:12px;background:#111;border:1px solid #333;border-radius:10px;color:#fff;box-sizing:border-box;">
                    <label style="display:block;font-size:0.7rem;color:#888;margin-bottom:4px;">Yangi parol</label>
                    <input id="edit-new-password" type="password" style="width:100%;max-width:480px;padding:10px 12px;margin-bottom:12px;background:#111;border:1px solid #333;border-radius:10px;color:#fff;box-sizing:border-box;">
                    <label style="display:block;font-size:0.7rem;color:#888;margin-bottom:4px;">Yangi parol (takror)</label>
                    <input id="edit-new-password2" type="password" style="width:100%;max-width:480px;padding:10px 12px;margin-bottom:16px;background:#111;border:1px solid #333;border-radius:10px;color:#fff;box-sizing:border-box;">
                    <button type="button" onclick="saveProfileSettingsCl()" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; padding: 12px 24px; border-radius: 10px; font-family: Orbitron; cursor: pointer; color: #000; font-weight: 600;"><i class="fas fa-save"></i> SAQLASH</button>
                </div>

                <div style="background: var(--card-bg); border: 1px solid rgba(255,68,68,0.35); border-radius: 20px; padding: 28px; margin-top: 24px;">
                    <h3 style="font-family: Orbitron; color: #ff6666; margin-bottom: 8px;"><i class="fas fa-skull-crossbones"></i> Xavfli zona</h3>
                    <p style="color:#888;font-size:0.8rem;margin-bottom:12px;">Hisobni serverdan butunlay o'chirish. 1 yil kirilmasa akkaunt avtomatik o'chirilishi mumkin.</p>
                    <label style="display:block;font-size:0.7rem;color:#888;margin-bottom:4px;">Tasdiqlash — joriy parol</label>
                    <input id="delete-account-password" type="password" autocomplete="off" style="width:100%;max-width:480px;padding:10px 12px;margin-bottom:12px;background:#111;border:1px solid #442222;border-radius:10px;color:#fff;box-sizing:border-box;">
                    <button type="button" onclick="deleteAccountCl()" style="background: rgba(255,68,68,0.25); border: 1px solid #ff4444; color: #ff8888; padding: 12px 24px; border-radius: 10px; font-family: Orbitron; cursor: pointer;"><i class="fas fa-user-slash"></i> HISOBNI O'CHIRISH</button>
                </div>
            `;
            document.getElementById('page-content').innerHTML = html;
        }

        // Market page
        function renderMarket() {
            const html = `
                <div class="savdo-page-bg">
                <div class="header">
                    <h1><i class="fas fa-store"></i> SAVDO MARKAZI</h1>
                    <p>Tangalar bilan kurslar va boostlar sotib oling</p>
                </div>

                <div style="background: linear-gradient(135deg, rgba(0,242,255,0.1), rgba(112,0,255,0.1)); border-radius: 24px; padding: 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    <div>
                        <h3 style="font-family: 'Orbitron';">BALANSINGIZ</h3>
                        <div style="font-size: 2.5rem; font-family: 'Orbitron'; color: var(--primary);">${(currentUser?.coins || 0).toLocaleString()} <i class="fas fa-coins"></i></div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;">
                    <div class="stat-card" style="text-align: center;">
                        <i class="fab fa-react" style="font-size: 2.5rem; color: var(--primary);"></i>
                        <h3 style="margin-top: 15px;">React Mastery</h3>
                        <p>Noldan professional darajagacha React.js</p>
                        <div style="font-size: 1.2rem; color: gold; margin: 15px 0;">50,000 <i class="fas fa-coins"></i></div>
                        <button onclick="buyItem('React Mastery', 50000)" style="background: var(--primary); border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">SOTIB OLISH</button>
                    </div>
                    <div class="stat-card" style="text-align: center;">
                        <i class="fab fa-node-js" style="font-size: 2.5rem; color: var(--primary);"></i>
                        <h3 style="margin-top: 15px;">Backend Expert</h3>
                        <p>Node.js va Express bilan backend</p>
                        <div style="font-size: 1.2rem; color: gold; margin: 15px 0;">65,000 <i class="fas fa-coins"></i></div>
                        <button onclick="buyItem('Backend Expert', 65000)" style="background: var(--primary); border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">SOTIB OLISH</button>
                    </div>
                    <div class="stat-card" style="text-align: center;">
                        <i class="fas fa-bolt" style="font-size: 2.5rem; color: #00ff88;"></i>
                        <h3 style="margin-top: 15px;">2X XP Boost</h3>
                        <p>24 soat davomida 2x XP</p>
                        <div style="font-size: 1.2rem; color: gold; margin: 15px 0;">5,000 <i class="fas fa-coins"></i></div>
                        <button onclick="buyItem('XP Booster', 5000)" style="background: var(--primary); border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">FAOLLASHTIRISH</button>
                    </div>
                </div>
                </div>
            `;
            document.getElementById('page-content').innerHTML = html;
        }

        // View task detail
        function viewTask(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (!task) return;

            const solution = prompt(`"${task.title}" vazifasi uchun yechim linkini kiriting:\n\n${task.description}`);
            if (solution && solution.trim()) {
                submitSolution(task.id, task.title, solution);
            }
        }

        // Submit solution
        async function submitSolution(taskId, taskTitle, solutionLink) {
            try {
                const response = await fetch('/api/submissions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        worker_id: currentUser.user_id || currentUser.id,
                        task_id: taskId,
                        task_title: taskTitle,
                        solution_link: solutionLink
                    })
                });
                const data = await response.json();
                if (data.success) {
                    alert("✅ Yechim yuborildi! Admin tekshiruvidan so'ng XP beriladi.");
                } else {
                    alert("Xatolik yuz berdi. Iltimos qayta urinib ko'ring.");
                }
            } catch (e) {
                alert("Ulanishda xatolik. Keyinroq urinib ko'ring.");
            }
        }

        // Buy item
        async function buyItem(itemName, price) {
            if (!currentUser || currentUser.coins < price) {
                alert("❌ Tangalar yetarli emas!");
                return;
            }

            if (confirm(`${itemName} mahsulotini ${price.toLocaleString()} tangaga sotib olasizmi?`)) {
                const newCoins = currentUser.coins - price;
                try {
                    const response = await fetch(`/api/users/${currentUser.user_id || currentUser.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...currentUser, coins: newCoins })
                    });
                    const data = await response.json();
                    if (data.success) {
                        currentUser = data.user;
                        persistClientUser();
                        alert(`✅ ${itemName} sotib olindi!`);
                        renderMarket();
                        updateSidebar();
                    }
                } catch (e) {
                    alert("Xatolik yuz berdi.");
                }
            }
        }

        // Register user
        async function registerUser() {
            const full_name = document.getElementById('reg-name').value;
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const school = document.getElementById('reg-school').value;
            const region = document.getElementById('reg-region').value;

            if (!full_name || !username || !password || !school || !region) {
                alert("Barcha maydonlarni to'ldiring!");
                return;
            }

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, full_name, password, region, school })
                });
                const data = await response.json();
                if (data.success) {
                    currentUser = data.user;
                    persistClientUser();
                    document.getElementById('reg-modal').style.display = 'none';
                    updateUI();
                } else {
                    alert("Xatolik: " + data.error);
                }
            } catch (e) {
                alert("Server bilan ulanishda xatolik!");
            }
        }

        // Login user
        async function loginUser() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                alert("Username va parolni kiriting!");
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    currentUser = data.user;
                    persistClientUser();
                    document.getElementById('login-modal').style.display = 'none';
                    updateUI();
                } else {
                    alert("Username yoki parol xato!");
                }
            } catch (e) {
                alert("Server bilan ulanishda xatolik!");
            }
        }

        function showLogin() {
            document.getElementById('reg-modal').style.display = 'none';
            document.getElementById('login-modal').style.display = 'flex';
        }

        function showRegister() {
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('reg-modal').style.display = 'flex';
        }

        function logout() {
            if (confirm("Tizimdan chiqmoqchimisiz?")) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('exp_current_user');
                currentUser = null;
                location.reload();
            }
        }

        function updateUI() {
            if (currentUser) {
                document.getElementById('reg-modal').style.display = 'none';
                document.getElementById('login-modal').style.display = 'none';
                setExpSkinFromNav('dashboard');
                renderDashboard();
                updateSidebar();
                pingSessionIfApi();
            } else {
                document.getElementById('reg-modal').style.display = 'flex';
            }
        }

        function updateSidebar() {
            if (currentUser && currentUser.role === 'admin') {
                document.getElementById('admin-link').style.display = 'flex';
            }
        }

        function setExpSkinFromNav(page) {
            const skinMap = {
                dashboard: 'dashboard',
                tasks: 'tasks',
                leaderboard: 'rank',
                market: 'market',
                profile: 'profile',
                admin: 'dashboard'
            };
            document.documentElement.setAttribute('data-exp-skin', skinMap[page] || 'dashboard');
        }

        // Page navigation
        function navigateTo(page) {
            if (!currentUser && page !== 'register' && page !== 'login') {
                document.getElementById('reg-modal').style.display = 'flex';
                return;
            }

            setExpSkinFromNav(page);
            if (page !== 'profile') pendingAvatar = null;

            switch(page) {
                case 'dashboard': renderDashboard(); break;
                case 'tasks': renderTasks(); break;
                case 'leaderboard': renderLeaderboard(); break;
                case 'profile': renderProfile(); break;
                case 'market': renderMarket(); break;
                default: renderDashboard();
            }
        }

        // Event listeners
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = link.getAttribute('data-page');
                if (page) {
                    navigateTo(page);
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                }
            });
        });

        // Initial load
        window.onload = async () => {
            await loadTasks();
            try {
                const h = await fetch('/api/health');
                const j = await h.json();
                if (j && j.database === false && !sessionStorage.getItem('exp_warn_db')) {
                    sessionStorage.setItem('exp_warn_db', '1');
                    alert("PostgreSQL ulangan emas (DATABASE_URL). Akkauntlar serverda saqlanmaydi. .env (mahalliy) yoki Render → Environment qo'shing (Neon connection string).");
                }
            } catch (_) { /* server yo'q */ }
            updateUI();
        };
    </script>
</body>
</html>
