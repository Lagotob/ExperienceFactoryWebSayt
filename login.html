<!DOCTYPE html>
<html lang="uz" data-exp-skin="auth">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL ACCESS | EXP Factory</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00f2ff; --bg: #050505; --err: #ff0055; }
        body { background: var(--bg); color: white; font-family: 'Orbitron'; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        .login-box { width: 380px; padding: 40px; background: rgba(10,10,10,0.95); border: 1px solid rgba(0,242,255,0.2); border-top: 4px solid var(--p); box-shadow: 0 0 50px rgba(0,0,0,1); position: relative; }
        .login-box::before { content: "SYSTEM_LOGIN_V2"; position: absolute; top: -25px; left: 0; font-size: 10px; color: var(--p); letter-spacing: 3px; }
        h2 { text-align: center; margin-bottom: 30px; letter-spacing: 5px; text-shadow: 0 0 10px var(--p); }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: var(--p); }
        input { width: 100%; padding: 15px 15px 15px 45px; background: #0d0d0d; border: 1px solid #222; color: white; font-family: 'Orbitron'; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(0,242,255,0.1); }
        button { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--p); color: var(--p); font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 2px; }
        button:hover { background: var(--p); color: black; box-shadow: 0 0 30px var(--p); }
        .links { margin-top: 20px; text-align: center; font-size: 0.7rem; }
        .links a { color: #555; text-decoration: none; }
        .links a:hover { color: var(--p); }
    </style>
    <script>try{var t=localStorage.getItem('exp_factory_theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}</script>
    <link rel="stylesheet" href="theme.css">
</head>
<body>
    <button type="button" class="theme-toggle theme-toggle-float" onclick="ExpTheme.toggle()" aria-label="Mavzu" title="Qorong'u / yorug'"><i class="fas fa-sun theme-icon-sun" aria-hidden="true"></i><i class="fas fa-moon theme-icon-moon" aria-hidden="true"></i></button>
    <div class="login-box">
        <h2>LOGIN</h2>
        <div class="input-group">
            <i class="fas fa-user-secret"></i>
            <input type="text" id="user" placeholder="USERNAME" autocomplete="off">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="pass" placeholder="PASSWORD">
        </div>
        <button onclick="handleLogin()" id="loginBtn">ACCESS_GRANTED</button>
        <div class="links"><a href="register.html">YANGI AGENT RO'YXATDAN O'TISH</a></div>
    </div>
    <script src="theme.js"></script>
    <script>
        function persistSessionUser(u) {
            if (!u || typeof u !== 'object') return;
            if (u.user_id != null && u.id == null) u.id = u.user_id;
            var s = JSON.stringify(u);
            localStorage.setItem('currentUser', s);
            localStorage.setItem('exp_current_user', s);
        }

        async function handleLogin() {
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('loginBtn');
            if (!user || !pass) return;
            btn.innerText = "VERIFYING...";
            btn.disabled = true;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                var data = {};
                try {
                    data = await res.json();
                } catch (_) {}
                if (res.ok && data.success && data.user) {
                    persistSessionUser(data.user);
                    window.location.href = 'dashboard.html';
                    return;
                }
                throw new Error(data.error || 'denied');
            } catch (e) {
                btn.style.borderColor = "var(--err)";
                btn.innerText = "DENIED";
                setTimeout(function () {
                    btn.disabled = false;
                    btn.innerText = "ACCESS_GRANTED";
                    btn.style.borderColor = "var(--p)";
                }, 2000);
            }
        }
    </script>
</body>
</html>
