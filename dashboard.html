<!DOCTYPE html>
<html lang="uz" data-exp-skin="dashboard">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard | EXP Factory</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00f2ff;
            --primary-dark: #00c4d0;
            --secondary: #8b5cf6;
            --secondary-dark: #7c3aed;
            --accent: #f43f5e;
            --bg: #0a0a0a;
            --bg-card: #111111;
            --bg-sidebar: #0c0c0c;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: all 0.3s;
        }

        .logo {
            padding: 1.8rem 1.5rem;
            font-family: 'Orbitron';
            font-weight: 800;
            font-size: 1.3rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .logo span {
            background: var(--gradient);
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            padding: 0.9rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-dim);
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 0.75rem;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .nav-link i {
            width: 24px;
            font-size: 1.1rem;
        }

        .nav-link.active,
        .nav-link:hover {
            color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
            border-left-color: var(--primary);
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 2rem;
            width: calc(100% - 280px);
            min-height: 100vh;
        }

        /* Header */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            background: var(--gradient);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .stat-card h3 {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'Orbitron';
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-family: 'Orbitron';
            font-weight: 700;
            color: var(--primary);
        }

        /* Progress Section */
        .progress-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        /* Tasks Section */
        .tasks-section h2 {
            font-family: 'Orbitron';
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .task-item:hover {
            border-color: var(--primary);
            transform: translateX(8px);
        }

        .task-info h4 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .task-info p {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .task-reward {
            text-align: right;
            font-family: 'Orbitron';
            color: var(--success);
            font-weight: bold;
        }

        .difficulty {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            margin-top: 0.3rem;
        }

        .difficulty.oson { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .difficulty.orta { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .difficulty.qiyin { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        /* Table */
        .ranking-table {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        .ranking-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .ranking-table th {
            padding: 1rem;
            text-align: left;
            color: var(--text-muted);
            font-family: 'Orbitron';
            font-size: 0.7rem;
            border-bottom: 1px solid var(--border);
        }

        .ranking-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .rank-badge {
            font-family: 'Orbitron';
            color: var(--primary);
            font-weight: bold;
        }

        /* Market Grid */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
        }

        .product-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .product-icon {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .product-price {
            font-size: 1.2rem;
            color: var(--warning);
            font-family: 'Orbitron';
            margin: 1rem 0;
        }

        .btn-buy {
            background: var(--gradient);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            font-family: 'Orbitron';
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-buy:hover {
            transform: scale(0.98);
        }

        /* Profile Section */
        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .profile-avatar i {
            font-size: 3rem;
            color: #000;
        }

        .profile-bio {
            margin: 0.75rem 0 1rem;
            padding: 0.75rem 1rem;
            background: rgba(0, 242, 255, 0.06);
            border-radius: 12px;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.9rem;
            line-height: 1.5;
            max-width: 520px;
            white-space: pre-wrap;
        }

        .profile-edit-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .profile-edit-card h3 {
            font-family: 'Orbitron';
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .profile-form label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
            font-family: 'Orbitron';
        }

        .profile-form input,
        .profile-form textarea {
            width: 100%;
            max-width: 480px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        .profile-form textarea {
            min-height: 88px;
            resize: vertical;
        }

        .profile-form .hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin: -0.5rem 0 1rem;
        }

        .btn-profile-save {
            background: var(--gradient);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-family: 'Orbitron';
            font-weight: 600;
            cursor: pointer;
            color: #000;
        }

        .btn-profile-save:hover {
            opacity: 0.92;
        }

        .avatar-actions {
            margin-top: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .btn-avatar {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-family: 'Orbitron';
            cursor: pointer;
        }

        .btn-avatar.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .profile-info {
            flex: 1;
        }

        .profile-info h2 {
            font-family: 'Orbitron';
            margin-bottom: 1rem;
        }

        .profile-detail {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.8rem;
            color: var(--text-dim);
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            font-family: 'Orbitron';
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        /* Admin Panel */
        .admin-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .admin-form {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .admin-form input,
        .admin-form select,
        .admin-form textarea {
            flex: 1;
            min-width: 200px;
            padding: 0.8rem;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: var(--text);
        }

        .submission-item {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .btn-approve {
            background: var(--success);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-reject {
            background: var(--danger);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        /* Session Time */
        .session-box {
            padding: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            text-align: center;
            color: var(--text-muted);
        }

        .session-box span {
            color: var(--primary);
            font-family: 'Orbitron';
        }

        /* Responsive */
        @media (max-width: 992px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .sidebar span {
                display: none;
            }
            .logo {
                font-size: 0.8rem;
                padding: 1.2rem 0;
            }
            .main-content {
                margin-left: 70px;
                width: calc(100% - 70px);
                padding: 1rem;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.8rem;
            }
            .profile-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .profile-detail {
                justify-content: center;
            }
        }
    </style>

    <aside class="sidebar">
        <div class="logo"><span>EXP</span></div>
        <nav>
            <div class="nav-link active" data-page="dashboard">
                <i class="fas fa-home"></i> <span>BOSH SAHIFA</span>
            </div>
            <div class="nav-link" data-page="tasks">
                <i class="fas fa-tasks"></i> <span>TOPSHIRIQLAR</span>
            </div>
            <div class="nav-link" data-page="leaderboard">
                <i class="fas fa-trophy"></i> <span>REYTING</span>
            </div>
            <div class="nav-link" data-page="market">
                <i class="fas fa-store"></i> <span>SAVDO</span>
            </div>

        <div class="sidebar-bottom-stack">
            <div class="sidebar-theme-wrap">
                <button type="button" class="theme-toggle" onclick="ExpTheme.toggle()" aria-label="Mavzu" title="Qorong'u / yorug'"><i class="fas fa-sun theme-icon-sun" aria-hidden="true"></i><i class="fas fa-moon theme-icon-moon" aria-hidden="true"></i></button>

                <i class="fas fa-clock"></i> SESSION: <span id="session-time">00:00:00</span>
            </div>

    <main class="main-content">
        <div id="page-content">
            <!-- Dynamic content -->
        </div>
    </main>

    <script src="theme.js"></script>
    <script>
        // ============ DATA ============
        const USERS_KEY = 'exp_factory_users';
        const TASKS_KEY = 'exp_factory_tasks';
        const SUBMISSIONS_KEY = 'exp_factory_submissions';
        
        let users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
        let currentUser = JSON.parse(localStorage.getItem('exp_current_user'));
        let tasks = JSON.parse(localStorage.getItem(TASKS_KEY)) || [];
        let submissions = JSON.parse(localStorage.getItem(SUBMISSIONS_KEY)) || [];
        
        const DEFAULT_TASKS = [
            { id: 1, title: "Algoritmlar Asosi", description: "C++ tilida 5 ta saralash algoritmini yozing", difficulty: "oson", reward_xp: 250, tech_stack: "C++" },
            { id: 2, title: "Baza Bilan Ishlash", description: "PostgreSQL da murakkab JOIN so'rovlarini bajaring", difficulty: "orta", reward_xp: 400, tech_stack: "SQL" },
            { id: 3, title: "Web Scraper", description: "Python yordamida ma'lumot yig'uvchi bot yarating", difficulty: "qiyin", reward_xp: 600, tech_stack: "Python" },
            { id: 4, title: "React Komponentlar", description: "5 ta qayta ishlatiladigan React komponenti yozing", difficulty: "oson", reward_xp: 300, tech_stack: "React" },
            { id: 5, title: "REST API", description: "Node.js va Express bilan to'liq API yarating", difficulty: "orta", reward_xp: 500, tech_stack: "Node.js" }
        ];
        
        if (tasks.length === 0) {
            tasks = DEFAULT_TASKS;
            localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
        }
        
        let sessionSeconds = parseInt(localStorage.getItem('session_time')) || 0;
        let pendingAvatar = null;

        // Check auth
        if (!currentUser) {
            window.location.href = 'index.html';
        } else {
            if (currentUser.bio === undefined) currentUser.bio = '';
            if (currentUser.avatar_data === undefined) currentUser.avatar_data = '';
            const _ix = users.findIndex(u => u.id === currentUser.id);
            if (_ix !== -1) {
                if (users[_ix].bio === undefined) users[_ix].bio = '';
                if (users[_ix].avatar_data === undefined) users[_ix].avatar_data = '';
                users[_ix] = { ...users[_ix], bio: currentUser.bio, avatar_data: currentUser.avatar_data };
                saveUsers();
            }
            localStorage.setItem('exp_current_user', JSON.stringify(currentUser));
        }
        
        // Save functions
        function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
        function saveTasks() { localStorage.setItem(TASKS_KEY, JSON.stringify(tasks)); }
        function saveSubmissions() { localStorage.setItem(SUBMISSIONS_KEY, JSON.stringify(submissions)); }
        
        // Session timer: UI har sekund, localStorage ~10 sekundda bir (disk yuki kam)
        setInterval(() => {
            sessionSeconds++;
            if (sessionSeconds % 10 === 0) {
                localStorage.setItem('session_time', String(sessionSeconds));
            }
            const h = Math.floor(sessionSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((sessionSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (sessionSeconds % 60).toString().padStart(2, '0');
            const sessionElem = document.getElementById('session-time');
            if (sessionElem) sessionElem.textContent = `${h}:${m}:${s}`;
        }, 1000);
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('session_time', String(sessionSeconds));
        });
        
        // Helper functions
        function getLevel(xp) { return Math.floor((xp || 0) / 1000) + 1; }
        function getProgress(xp) { return ((xp || 0) % 1000) / 10; }

        function escapeHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function escapeAttr(str) {
            if (str == null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;');
        }

        function onProfileAvatarFile(ev) {
            const f = ev.target.files && ev.target.files[0];
            if (!f) return;
            if (!f.type.startsWith('image/')) {
                alert("Faqat rasm fayli tanlang.");
                return;
            }
            if (f.size > 450 * 1024) {
                alert("Rasm hajmi 450 KB dan oshmasin.");
                return;
            }
            const reader = new FileReader();
            reader.onload = () => {
                pendingAvatar = reader.result;
                renderProfile();
            };
            reader.readAsDataURL(f);
            ev.target.value = '';
        }

        function clearProfileAvatar() {
            if (!confirm("Profil rasmini olib tashlaysizmi?")) return;
            pendingAvatar = null;
            currentUser.avatar_data = '';
            updateUserInArray(currentUser);
            renderProfile();
        }

        function saveProfileSettings() {
            const fullName = document.getElementById('edit-full-name').value.trim();
            const bio = document.getElementById('edit-bio').value;
            const oldPass = document.getElementById('edit-old-password').value;
            const newPass = document.getElementById('edit-new-password').value;
            const newPass2 = document.getElementById('edit-new-password2').value;

            if (!fullName) {
                alert("Ism-familiya bo'sh bo'lmasin.");
                return;
            }

            if (newPass || newPass2 || oldPass) {
                if (!oldPass) {
                    alert("Parolni o'zgartirish uchun joriy parolni kiriting.");
                    return;
                }
                if (oldPass !== currentUser.password) {
                    alert("Joriy parol noto'g'ri.");
                    return;
                }
                if (newPass.length < 4) {
                    alert("Yangi parol kamida 4 belgi bo'lsin.");
                    return;
                }
                if (newPass !== newPass2) {
                    alert("Yangi parollar mos kelmaydi.");
                    return;
                }
                currentUser.password = newPass;
            }

            currentUser.full_name = fullName;
            currentUser.bio = bio;
            if (pendingAvatar !== null) {
                currentUser.avatar_data = pendingAvatar;
                pendingAvatar = null;
            }
            updateUserInArray(currentUser);
            const op = document.getElementById('edit-old-password');
            const np = document.getElementById('edit-new-password');
            const n2 = document.getElementById('edit-new-password2');
            if (op) op.value = '';
            if (np) np.value = '';
            if (n2) n2.value = '';
            alert("✅ Profil saqlandi.");
            renderProfile();
        }

        function deleteAccountLocal() {
            const pwdEl = document.getElementById('delete-account-password');
            const pwd = pwdEl ? pwdEl.value : '';
            if (!pwd) {
                alert("Parolni kiriting.");
                return;
            }
            if (pwd !== currentUser.password) {
                alert("Joriy parol noto'g'ri.");
                return;
            }
            if (!confirm("Hisobingiz bu qurilmadagi ro'yxatdan o'chiriladi. Davom etasizmi?")) return;
            users = users.filter(u => u.id !== currentUser.id);
            saveUsers();
            localStorage.removeItem('exp_current_user');
            currentUser = null;
            alert("Hisob o'chirildi.");
            window.location.href = 'index.html';
        }
        
        // Update user in array
        function updateUserInArray(updatedUser) {
            const index = users.findIndex(u => u.id === updatedUser.id);
            if (index !== -1) users[index] = updatedUser;
            saveUsers();
            currentUser = updatedUser;
            localStorage.setItem('exp_current_user', JSON.stringify(currentUser));
        }
        
        // Submit solution
        function submitTask(taskId, taskTitle, rewardXp) {
            const solution = prompt(`"${taskTitle}" vazifasi uchun yechim linkini kiriting:\n\nMisol: https://github.com/username/project`);
            if (solution && solution.trim()) {
                const submission = {
                    id: Date.now(),
                    worker_id: currentUser.id,
                    worker_name: currentUser.full_name,
                    task_id: taskId,
                    task_title: taskTitle,
                    solution_link: solution.trim(),
                    reward_xp: rewardXp,
                    status: 'pending',
                    created_at: new Date().toISOString()
                };
                submissions.push(submission);
                saveSubmissions();
                alert("✅ Yechim yuborildi! Admin tekshiruvidan so'ng XP beriladi.");
            }
        }
        
        // Buy item
        function buyItem(itemName, price) {
            if (!currentUser || currentUser.coins < price) {
                alert(`❌ Tangalar yetarli emas! Sizda ${currentUser?.coins || 0} tanga bor.`);
                return;
            }
            
            if (confirm(`${itemName} mahsulotini ${price.toLocaleString()} tangaga sotib olasizmi?`)) {
                currentUser.coins -= price;
                updateUserInArray(currentUser);
                alert(`✅ ${itemName} sotib olindi! Kurs profilingizda ochiladi.`);
                if (currentPage === 'market') renderMarket();
                else if (currentPage === 'profile') renderProfile();
            }
        }
        
        // Approve submission (Admin)
        function approveSubmission(subId) {
            const submission = submissions.find(s => s.id === subId);
            if (!submission || submission.status !== 'pending') return;
            
            const user = users.find(u => u.id === submission.worker_id);
            if (user) {
                user.xp = (user.xp || 0) + submission.reward_xp;
                user.completed_tasks = (user.completed_tasks || 0) + 1;
                saveUsers();
                
                if (currentUser.id === user.id) {
                    currentUser = user;
                    localStorage.setItem('exp_current_user', JSON.stringify(currentUser));
                }
            }
            
            submission.status = 'approved';
            saveSubmissions();
            alert("✅ Yechim tasdiqlandi! XP berildi.");
            renderAdminPanel();
        }
        
        function rejectSubmission(subId) {
            const submission = submissions.find(s => s.id === subId);
            if (submission && submission.status === 'pending') {
                submission.status = 'rejected';
                saveSubmissions();
                alert("❌ Yechim rad etildi.");
                renderAdminPanel();
            }
        }
        
        // Add new task (Admin)
        function addTask() {
            const title = document.getElementById('task-title')?.value;
            const description = document.getElementById('task-desc')?.value;
            const difficulty = document.getElementById('task-diff')?.value;
            const reward = parseInt(document.getElementById('task-reward')?.value);
            const tech = document.getElementById('task-tech')?.value;
            
            if (!title || !description || !reward) {
                alert("Barcha maydonlarni to'ldiring!");
                return;
            }
            
            const newTask = {
                id: Date.now(),
                title: title,
                description: description,
                difficulty: difficulty || 'orta',
                reward_xp: reward,
                tech_stack: tech || 'General'
            };
            
            tasks.push(newTask);
            saveTasks();
            alert("✅ Yangi topshiriq qo'shildi!");
            renderAdminPanel();
            
            const formInputs = ['task-title', 'task-desc', 'task-reward', 'task-tech'];
            formInputs.forEach(id => {
                const elem = document.getElementById(id);
                if (elem) elem.value = '';
            });
        }
        
        function deleteTask(taskId) {
            if (confirm("Bu topshiriqni o'chirmoqchimisiz?")) {
                tasks = tasks.filter(t => t.id !== taskId);
                saveTasks();
                renderAdminPanel();
            }
        }
        
        // ============ RENDER FUNCTIONS ============
        let currentPage = 'dashboard';
        
        function renderDashboard() {
            const level = getLevel(currentUser.xp);
            const progress = getProgress(currentUser.xp);
            const nextXP = 1000 - (currentUser.xp % 1000);
            
            const html = `
                <div class="page-header">
                    <h1>SALOM, ${(currentUser.full_name || currentUser.username).toUpperCase()}!</h1>
                    <p><i class="fas fa-map-marker-alt"></i> ${currentUser.region || 'Tanlanmagan'} | 
                       <i class="fas fa-graduation-cap"></i> ${currentUser.school || 'Tanlanmagan'}</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3><i class="fas fa-coins"></i> TANGALAR</h3>
                        <div class="value">${(currentUser.coins || 0).toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3><i class="fas fa-star"></i> TAJRIBA (XP)</h3>
                        <div class="value">${(currentUser.xp || 0).toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3><i class="fas fa-chart-line"></i> DARAJA</h3>
                        <div class="value">${level}</div>
                    </div>
                    <div class="stat-card">
                        <h3><i class="fas fa-check-circle"></i> BAJARILGAN</h3>
                        <div class="value">${currentUser.completed_tasks || 0}</div>
                    </div>
                </div>
                
                <div class="progress-section">
                    <div class="progress-header">
                        <span>KEYINGI DARAJA PROGRESSI</span>
                        <span>${Math.floor(progress)}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%;"></div>
                    </div>
                    <p style="margin-top: 1rem; font-size: 0.75rem; color: var(--text-muted);">
                        <i class="fas fa-arrow-up"></i> Keyingi daraja uchun yana ${nextXP} XP kerak
                    </p>
                </div>
                
                <div class="tasks-section">
                    <h2><i class="fas fa-tasks"></i> FAOL TOPSHIRIQLAR</h2>
                    <div class="task-list">
                        ${tasks.slice(0, 3).map(task => `
                            <div class="task-item" onclick="submitTask(${task.id}, '${task.title}', ${task.reward_xp})">
                                <div class="task-info">
                                    <h4>${task.title}</h4>
                                    <p>${task.description.substring(0, 70)}...</p>
                                    <span class="difficulty ${task.difficulty}">${task.difficulty === 'oson' ? 'Oson' : task.difficulty === 'orta' ? 'O\'rta' : 'Qiyin'}</span>
                                </div>
                                <div class="task-reward">
                                    +${task.reward_xp} XP
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ${tasks.length > 3 ? '<p style="text-align: center; margin-top: 1rem;"><span onclick="navigateTo(\'tasks\')" style="color: var(--primary); cursor: pointer;">Barcha topshiriqlarni ko\'rish →</span></p>' : ''}
                </div>
            `;
            document.getElementById('page-content').innerHTML = html;
        }
        
        function renderTasks() {
            const html = `
                <div class="page-header">
                    <h1><i class="fas fa-code"></i> TOPSHIRIQLAR</h1>
                    <p>Yechimlaringizni yuboring va XP to'plang</p>
                </div>
                
                <div class="tasks-section">
                    <div class="task-list">
                        ${tasks.map(task => `
                            <div class="task-item" onclick="submitTask(${task.id}, '${task.title}', ${task.reward_xp})">
                                <div class="task-info">
                                    <h4>${task.title}</h4>
                                    <p>${task.description}</p>
                                    <small style="color: var(--text-muted);"><i class="fas fa-microchip"></i> ${task.tech_stack || 'General'}</small>
                                    <span class="difficulty ${task.difficulty}" style="margin-left: 10px;">${task.difficulty === 'oson' ? 'Oson' : task.difficulty === 'orta' ? 'O\'rta' : 'Qiyin'}</span>
                                </div>
                                <div class="task-reward">
                                    +${task.reward_xp} XP
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('page-content').innerHTML = html;
        }
        
        function renderLeaderboard() {
            const sortedUsers = [...users].sort((a, b) => (b.xp || 0) - (a.xp || 0));
            
            const html = `
                <div class="page-header">
                    <h1><i class="fas fa-trophy"></i> GLOBAL REYTING</h1>
                    <p>Eng faol va tajribali agentlar</p>
                </div>
                
                <div class="ranking-table">
                    <table>
                        <thead>
                            <tr>
                                <th>RANK</th>
                                <th>AGENT</th>
                                <th>XP</th>
                                <th>DARAJA</th>
                                <th>BAJARILGAN</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sortedUsers.map((user, index) => `
                                <tr style="${currentUser.id === user.id ? 'background: rgba(0,242,255,0.05);' : ''}">

                                    <td><b>${user.full_name || user.username}</b> ${currentUser.id === user.id ? '<span style="color: var(--primary);"> (SIZ)</span>' : ''}</td>
                                    <td>${(user.xp || 0).toLocaleString()} XP</td>
                                    <td>${getLevel(user.xp)}</td>
                                    <td>${user.completed_tasks || 0}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

            document.getElementById('page-content').innerHTML = html;
        }
        
        function renderMarket() {
            const html = `
                <div class="savdo-page-bg">
                <div class="page-header">
                    <h1><i class="fas fa-store"></i> SAVDO MARKAZI</h1>
                    <p>Tangalar bilan kurslar va boostlar sotib oling</p>
                </div>
                
                <div style="background: linear-gradient(135deg, rgba(0,242,255,0.1), rgba(139,92,246,0.1)); border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    <div>
                        <h3 style="font-family: 'Orbitron';">SIZNING BALANS</h3>
                        <div style="font-size: 2rem; font-family: 'Orbitron'; color: var(--warning);">${(currentUser.coins || 0).toLocaleString()} <i class="fas fa-coins"></i></div>
                    </div>
                </div>
                
                <div class="market-grid">
                    <div class="product-card">
                        <div class="product-icon"><i class="fab fa-react"></i></div>
                        <h3>React Mastery</h3>
                        <p>Noldan professional darajagacha React.js kursi</p>
                        <div class="product-price">50,000 <i class="fas fa-coins"></i></div>
                        <button class="btn-buy" onclick="buyItem('React Mastery', 50000)">SOTIB OLISH</button>
                    </div>
                    <div class="product-card">
                        <div class="product-icon"><i class="fab fa-node-js"></i></div>
                        <h3>Backend Expert</h3>
                        <p>Node.js va Express bilan backend tizimlar</p>
                        <div class="product-price">65,000 <i class="fas fa-coins"></i></div>
                        <button class="btn-buy" onclick="buyItem('Backend Expert', 65000)">SOTIB OLISH</button>
                    </div>
                    <div class="product-card">
                        <div class="product-icon"><i class="fas fa-bolt"></i></div>
                        <h3>2X XP Boost</h3>
                        <p>24 soat davomida 2 barobar XP</p>
                        <div class="product-price">5,000 <i class="fas fa-coins"></i></div>
                        <button class="btn-buy" onclick="buyItem('XP Booster', 5000)">FAOLLASHTIRISH</button>
                    </div>
                </div>
                </div>
            `;
            document.getElementById('page-content').innerHTML = html;
        }
        
        function renderProfile() {
            const level = getLevel(currentUser.xp);
            const joinDate = currentUser.created_at ? new Date(currentUser.created_at).toLocaleDateString('uz-UZ') : '2024';
            const avatarSrc = pendingAvatar !== null ? pendingAvatar : (currentUser.avatar_data || '');
            const avatarInner = avatarSrc
                ? `<img src="${avatarSrc}" alt="">`
                : '<i class="fas fa-user"></i>';
            const bioText = (currentUser.bio || '').trim();
            const bioBlock = bioText
                ? `<div class="profile-bio">${escapeHtml(currentUser.bio)}</div>`
                : '<p style="color:var(--text-muted);font-size:0.85rem;margin:0 0 0.5rem;">Bio qo\'shilmagan.</p>';

            const html = `
                <div class="page-header">
                    <h1><i class="fas fa-user-circle"></i> SHAXSIY PROFIL</h1>
                    <p>Hisobingiz va statistikangiz</p>
                </div>
                
                <div class="profile-card">
                    <div>
                        <div class="profile-avatar">${avatarInner}</div>
                        <div class="avatar-actions">
                            <input type="file" id="profile-avatar-file" accept="image/*" style="display:none" onchange="onProfileAvatarFile(event)">
                            <button type="button" class="btn-avatar" onclick="document.getElementById('profile-avatar-file').click()"><i class="fas fa-camera"></i> Rasm</button>
                            ${(avatarSrc) ? '<button type="button" class="btn-avatar danger" onclick="clearProfileAvatar()"><i class="fas fa-times"></i> Rasmni olib tashlash</button>' : ''}
                        </div>
                    </div>
                    <div class="profile-info">
                        <h2>${escapeHtml(currentUser.full_name || currentUser.username)}</h2>
                        <div class="profile-detail"><i class="fas fa-tag"></i> @${escapeHtml(currentUser.username)} <span style="opacity:0.7;font-size:0.75rem;">(login o'zgarmaydi)</span></div>
                        ${bioBlock}
                        <div class="profile-detail"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(currentUser.region || 'Tanlanmagan')}</div>
                        <div class="profile-detail"><i class="fas fa-graduation-cap"></i> ${escapeHtml(currentUser.school || 'Tanlanmagan')}</div>
                        <div class="profile-detail"><i class="fas fa-calendar"></i> Qo'shilgan: ${joinDate}</div>
                        <div class="profile-detail"><i class="fas fa-chart-line"></i> Daraja: ${level}</div>
                        <div class="profile-detail"><i class="fas fa-star"></i> XP: ${(currentUser.xp || 0).toLocaleString()}</div>
                        <div class="profile-detail"><i class="fas fa-coins"></i> Tangalar: ${(currentUser.coins || 0).toLocaleString()}</div>
                        <div class="profile-detail"><i class="fas fa-check-circle"></i> Bajarilgan topshiriqlar: ${currentUser.completed_tasks || 0}</div>
                        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> TIZIMDAN CHIQISH</button>
                    </div>
                </div>

                <div class="profile-edit-card">
                    <h3><i class="fas fa-sliders-h"></i> Profilni sozlash</h3>
                    <p class="hint" style="margin-bottom:1rem;">Ko'rinadigan ism, bio va parol. Username (login) o'zgartirilmaydi.</p>
                    <div class="profile-form">
                        <label for="edit-full-name">Ism va familiya</label>
                        <input type="text" id="edit-full-name" value="${escapeAttr(currentUser.full_name || '')}" maxlength="120" autocomplete="name">

                        <label for="edit-bio">Bio</label>
                        <textarea id="edit-bio" maxlength="600" placeholder="O'zingiz haqingizda qisqacha...">${escapeHtml(currentUser.bio || '')}</textarea>

                        <label for="edit-old-password">Joriy parol <span style="opacity:0.8;">(parolni o'zgartirish uchun)</span></label>
                        <input type="password" id="edit-old-password" autocomplete="current-password" placeholder="••••••••">

                        <label for="edit-new-password">Yangi parol</label>
                        <input type="password" id="edit-new-password" autocomplete="new-password" placeholder="O'zgartirmasangiz bo'sh qoldiring">

                        <label for="edit-new-password2">Yangi parol (takror)</label>
                        <input type="password" id="edit-new-password2" autocomplete="new-password" placeholder="Takrorlang">

                        <button type="button" class="btn-profile-save" onclick="saveProfileSettings()"><i class="fas fa-save"></i> SAQLASH</button>
                    </div>
                </div>

                <div class="profile-edit-card" style="border-color: rgba(255,68,68,0.4);">
                    <h3 style="color: #ff6666;"><i class="fas fa-skull-crossbones"></i> Xavfli zona</h3>
                    <p class="hint" style="margin-bottom: 1rem;">Hisobni bu brauzerdagi demo-ro'yxatdan o'chirish. Serverdagi akkaunt uchun <code>client.html</code> orqali o'chiring.</p>
                    <div class="profile-form">
                        <label for="delete-account-password">Tasdiqlash — joriy parol</label>
                        <input type="password" id="delete-account-password" autocomplete="off" placeholder="Parol">
                        <button type="button" class="btn-profile-save" style="background: rgba(255,68,68,0.2); border: 1px solid #ff4444; color: #ff8888;" onclick="deleteAccountLocal()"><i class="fas fa-user-slash"></i> HISOBNI O'CHIRISH</button>
                    </div>
                </div>
            `;
            document.getElementById('page-content').innerHTML = html;
        }
        
        function renderAdminPanel() {
            const pendingSubmissions = submissions.filter(s => s.status === 'pending');
            
            const html = `
                <div class="page-header">
                    <h1><i class="fas fa-shield-alt"></i> ADMIN PANEL</h1>
                    <p>Topshiriqlar va yechimlarni boshqarish</p>
                </div>
                
                <div class="admin-section">
                    <h3><i class="fas fa-plus-circle"></i> Yangi Topshiriq Qo'shish</h3>
                    <div class="admin-form">
                        <input type="text" id="task-title" placeholder="Topshiriq nomi">
                        <textarea id="task-desc" placeholder="Topshiriq tavsifi" rows="2"></textarea>
                        <select id="task-diff">
                            <option value="oson">Oson</option>
                            <option value="orta">O'rta</option>
                            <option value="qiyin">Qiyin</option>
                        </select>
                        <input type="number" id="task-reward" placeholder="Mukofot (XP)">
                        <input type="text" id="task-tech" placeholder="Texnologiya">
                        <button class="btn-buy" onclick="addTask()" style="width: auto;">QO'SHISH</button>
                    </div>
                </div>
                
                <div class="admin-section">
                    <h3><i class="fas fa-clock"></i> Kutilayotgan Yechimlar (${pendingSubmissions.length})</h3>
                    ${pendingSubmissions.length === 0 ? '<p style="color: var(--text-muted);">Hozircha yechimlar yo\'q</p>' : ''}
                    ${pendingSubmissions.map(sub => `
                        <div class="submission-item">
                            <div>
                                <b>${sub.worker_name}</b><br>
                                <small>${sub.task_title}</small><br>
                                <a href="${sub.solution_link}" target="_blank" style="color: var(--primary); font-size: 0.8rem;">Linkni ko'rish</a>
                            </div>
                            <div>
                                <button class="btn-approve" onclick="approveSubmission(${sub.id})">TASDIQLASH</button>
                                <button class="btn-reject" onclick="rejectSubmission(${sub.id})">RAD ETISH</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="admin-section">
                    <h3><i class="fas fa-list"></i> Barcha Topshiriqlar (${tasks.length})</h3>
                    ${tasks.map(task => `
                        <div class="submission-item" style="justify-content: space-between;">
                            <div>
                                <b>${task.title}</b><br>
                                <small>+${task.reward_xp} XP | ${task.difficulty === 'oson' ? 'Oson' : task.difficulty === 'orta' ? 'O\'rta' : 'Qiyin'}</small>
                            </div>
                            <button class="btn-reject" onclick="deleteTask(${task.id})" style="background: var(--danger);">O'CHIRISH</button>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('page-content').innerHTML = html;
        }
        
        function setExpSkinFromNav(page) {
            const skinMap = {
                dashboard: 'dashboard',
                tasks: 'tasks',
                leaderboard: 'rank',
                market: 'market',
                profile: 'profile',
                admin: 'dashboard'
            };
            document.documentElement.setAttribute('data-exp-skin', skinMap[page] || 'dashboard');
        }

        function navigateTo(page) {
            currentPage = page;
            if (page !== 'profile') pendingAvatar = null;
            setExpSkinFromNav(page);
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-page') === page) {
                    link.classList.add('active');
                }
            });
            
            switch(page) {
                case 'dashboard': renderDashboard(); break;
                case 'tasks': renderTasks(); break;
                case 'leaderboard': renderLeaderboard(); break;
                case 'market': renderMarket(); break;
                case 'profile': renderProfile(); break;
                case 'admin': renderAdminPanel(); break;
                default: renderDashboard();
            }
        }
        
        function logout() {
            if (confirm("Tizimdan chiqmoqchimisiz?")) {
                localStorage.removeItem('exp_current_user');
                window.location.href = 'index.html';
            }
        }
        
        // Event listeners
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                const page = link.getAttribute('data-page');
                if (page) navigateTo(page);
            });
        });
        
        // Check admin access
        if (currentUser && currentUser.role === 'admin') {
            document.getElementById('admin-nav').style.display = 'flex';
        }
        
        // Initialize
        navigateTo('dashboard');
    </script>
</body>
</html>
