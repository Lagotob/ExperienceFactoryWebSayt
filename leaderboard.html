<!DOCTYPE html>
<html lang="uz" data-exp-skin="rank">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Fame | EXP Factory</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #050505;
            --card-bg: rgba(13, 13, 13, 0.9);
            --gold: #ffc107;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Space Grotesk', sans-serif; display: flex; min-height: 100vh; overflow-x: hidden; flex-direction: column; }

        /* SIDEBAR */
        .sidebar {
            width: 260px; background: #080808; border-right: 1px solid rgba(255,255,255,0.05);
            height: 100vh; position: fixed; padding: 30px 0; z-index: 100;
        }
        .logo { font-family: 'Orbitron'; color: var(--primary); font-size: 1.2rem; text-align: center; letter-spacing: 3px; margin-bottom: 40px; }
        
        .nav-link {
            padding: 16px 30px; display: flex; align-items: center; gap: 15px;
            color: #666; text-decoration: none; transition: 0.3s; font-family: 'Orbitron'; font-size: 0.75rem;
        }
        .nav-link:hover, .nav-link.active { color: white; background: rgba(0, 242, 255, 0.05); border-left: 4px solid var(--primary); }

        /* MAIN CONTENT */
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 40px 60px; padding-bottom: 120px; }

        /* PODIUMS */
        .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin: 60px 0; min-height: 350px; }
        
        .podium-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); padding: 30px;
            width: 240px; text-align: center; position: relative; transition: 0.4s;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
        .podium-card:hover { transform: translateY(-10px); border-color: var(--primary); }

        .rank-1 { height: 380px; border-color: var(--gold); order: 2; box-shadow: 0 0 30px rgba(255, 193, 7, 0.1); }
        .rank-2 { height: 320px; border-color: var(--silver); order: 1; }
        .rank-3 { height: 280px; border-color: var(--bronze); order: 3; }

        .avatar-lg { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; border: 3px solid; background-size: cover; background-position: center; background-color: #111; }
        .rank-1 .avatar-lg { width: 110px; height: 110px; border-color: var(--gold); }

        .podium-card h3 { font-family: 'Orbitron'; font-size: 1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .xp-val { font-family: 'Orbitron'; color: var(--primary); font-size: 1.2rem; font-weight: 900; }

        /* TABLE */
        .table-wrapper { background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .custom-table { width: 100%; border-collapse: collapse; }
        .custom-table th { padding: 20px; text-align: left; background: rgba(255,255,255,0.02); font-family: 'Orbitron'; font-size: 0.65rem; color: var(--text-dim); }
        .custom-table td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
        
        .rank-badge { font-family: 'Orbitron'; color: var(--primary); font-weight: bold; }

        /* BOTTOM BAR */
        .user-rank-bar {
            position: fixed; bottom: 0; left: 260px; right: 0;
            background: var(--secondary); padding: 20px 60px;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 25px 25px 0 0; z-index: 200;
            box-shadow: 0 -10px 40px rgba(112, 0, 255, 0.4);
        }

        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        .f-btn { 
            background: #111; border: 1px solid #222; color: #555; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem;
        }
        .f-btn.active { border-color: var(--primary); color: white; background: rgba(0, 242, 255, 0.1); }

        @media (max-width: 1000px) {
            .sidebar { width: 80px; }
            .sidebar span, .logo { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); padding: 20px; }
            .user-rank-bar { left: 80px; padding: 15px 20px; }
            .podium-container { flex-direction: column; align-items: center; min-height: auto; gap: 40px; }
            .rank-1, .rank-2, .rank-3 { order: unset; width: 100%; height: auto; padding: 20px; }
        }
    </style>
    <script>try{var t=localStorage.getItem('exp_factory_theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}</script>
    <link rel="stylesheet" href="theme.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">EXP CORE</div>
        <nav>
            <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
            <a href="tasks.html" class="nav-link"><i class="fas fa-code"></i> <span>Masalalar</span></a>
            <a href="ranking.html" class="nav-link active"><i class="fas fa-award"></i> <span>Leaderboard</span></a>
            <a href="Marketplace.html" class="nav-link"><i class="fas fa-shopping-bag"></i> <span>Market</span></a>
            <a href="Profile.html" class="nav-link"><i class="fas fa-user-circle"></i> <span>Profil</span></a>
        </nav>
        <div class="sidebar-bottom-stack">
            <div class="sidebar-theme-wrap">
                <button type="button" class="theme-toggle" onclick="ExpTheme.toggle()" aria-label="Mavzu" title="Qorong'u / yorug'"><i class="fas fa-sun theme-icon-sun" aria-hidden="true"></i><i class="fas fa-moon theme-icon-moon" aria-hidden="true"></i></button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="header-flex">
            <div>
                <span style="color: var(--primary); font-family: monospace; letter-spacing: 2px;">// HALL_OF_FAME</span>
                <h1 style="font-family: 'Orbitron'; font-size: 2rem; margin-top: 10px;">GLOBAL RANKING</h1>
            </div>
            <div class="filter-group">
                <button class="f-btn active">ALL TIME</button>
            </div>
        </div>

        <section class="podium-container" id="podiumArea">
            </section>

        <div class="table-wrapper">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>RANK</th>
                        <th>OPERATIVE_ID</th>
                        <th>TOTAL_XP</th>
                        <th>COINS</th>
                        <th>TASKS</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    </tbody>
            </table>
        </div>
    </main>

    <div class="user-rank-bar" id="myRankBar">
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="myRankNum" style="font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem;">RANK: --</span>
            <img id="myAvatar" src="" width="45" style="border-radius: 50%; border: 2px solid white; background: #000;">
            <div>
                <b id="myName" style="display: block; font-size: 1.1rem;">Aniqlanmoqda...</b>
                <small style="opacity: 0.7; font-size: 0.7rem; font-family: 'Orbitron';">SIZNING STATUSINGIZ</small>
            </div>
        </div>
        <div id="myXP" style="font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; color: #fff;">0 XP</div>
    </div>

    <script src="theme.js"></script>
    <script>
        const SB_URL = "https://nltabynzbsdksskaehet.supabase.co";
        const SB_KEY = "sb_publishable_X5gsvBhDXV_UHbUTguTsmg_ZfCixY5Xz5-vR-Z-2E";

        async function fetchRanking() {
            try {
                const res = await fetch(`${SB_URL}/rest/v1/workers?select=*&order=xp.desc`, {
                    headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
                });
                const players = await res.json();
                renderUI(players);
            } catch (err) { 
                console.error("Ma'lumot olishda xatolik:", err); 
                document.getElementById('leaderboardBody').innerHTML = "<tr><td colspan='5' style='text-align:center; padding:50px; color:red;'>ULANISHDA XATOLIK!</td></tr>";
            }
        }

        function renderUI(players) {
            // 1. LocalStorage dan joriy foydalanuvchini olish
            const currentUser = JSON.parse(localStorage.getItem('currentUser')) || JSON.parse(localStorage.getItem('session_user'));

            // 2. Podium (Top 3) - Tartib: 2-o'rin (Chap), 1-o'rin (O'rta), 3-o'rin (O'ng)
            const podiumArea = document.getElementById('podiumArea');
            const top3 = players.slice(0, 3);
            let podiumHTML = '';
            
            // Tartib indeksi: [1, 0, 2] -> Kumush, Oltin, Bronza
            const displayOrder = [1, 0, 2]; 
            
            displayOrder.forEach(idx => {
                if(top3[idx]) {
                    const p = top3[idx];
                    const rank = idx + 1;
                    const rankClass = `rank-${rank}`;
                    const status = rank === 1 ? '👑 SYSTEM KING' : (rank === 2 ? '🥈 SILVER AGENT' : '🥉 BRONZE AGENT');
                    
                    podiumHTML += `
                        <div class="podium-card ${rankClass}">
                            <div class="avatar-lg" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=${p.username}')"></div>
                            <h3 title="${p.username}">${p.username}</h3>
                            <div class="xp-val">${(p.xp || 0).toLocaleString()}</div>
                            <div style="font-size: 0.65rem; margin-top: 10px; font-family: 'Orbitron'; opacity: 0.8; letter-spacing:1px;">${status}</div>
                        </div>
                    `;
                }
            });
            podiumArea.innerHTML = podiumHTML;

            // 3. Jadval (Barcha o'yinchilar)
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            
            players.forEach((p, index) => {
                const rank = index + 1;
                const isMe = currentUser && (p.username === currentUser.username);

                // Jadvalga 4-o'rindan pastdagilarni chiqarish (yoki hammasini, dizaynga qarab)
                if(rank > 3) {
                    tbody.innerHTML += `
                        <tr style="${isMe ? 'background: rgba(0,242,255,0.05);' : ''}">
                            <td><span class="rank-badge">#${rank.toString().padStart(2, '0')}</span></td>
                            <td>
                                <div style="display:flex; align-items:center; gap:15px;">
                                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${p.username}" width="35" style="background:#1a1a1a; border-radius:8px;">
                                    <b style="${isMe ? 'color:var(--primary)' : ''}">${p.username} ${isMe ? '(SIZ)' : ''}</b>
                                </div>
                            </td>
                            <td style="color: var(--primary); font-family: 'Orbitron'; font-weight:bold;">${(p.xp || 0).toLocaleString()} XP</td>
                            <td style="color: #00ff88;">${(p.coins || 0).toLocaleString()} <small>EXC</small></td>
                            <td>${p.completed_tasks || 0} Masala</td>
                        </tr>
                    `;
                }

                // 4. Pastki panelni yangilash (Agar joriy foydalanuvchi bo'lsa)
                if(isMe) {
                    document.getElementById('myRankNum').innerText = `RANK: #${rank}`;
                    document.getElementById('myName').innerText = p.username;
                    document.getElementById('myXP').innerText = `${(p.xp || 0).toLocaleString()} XP`;
                    document.getElementById('myAvatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${p.username}`;
                }
            });
        }

        // Sahifa yuklanganda ma'lumotlarni olish
        window.onload = fetchRanking;
    </script>
</body>
</html>
